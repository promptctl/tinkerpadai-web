# Cloudflare Workers deploy config (tinkerpadai-cloudflare-8le). The Worker runs the SAME app the
# Node entry runs, wiring R2 for artifacts and D1 for the catalog + sessions — no branch on
# environment, only the adapters differ (see src/web/worker.ts vs src/web/nodeApp.ts).
name = "tinkerpad"
main = "src/web/worker.ts"
compatibility_date = "2026-07-02"

# nodejs_compat: the shared core mints ids/tokens with node:crypto (randomUUID, randomBytes) and the
# storage seams are otherwise pure Web APIs. The flag supplies node:crypto at the edge so the same
# catalog/artifact/session code runs unchanged on Workers. The file adapters (node:fs) are never
# reachable from the Worker graph and are tree-shaken out.
compatibility_flags = ["nodejs_compat"]

# Routes MUST be a top-level key (before any [table] header) — a `routes` key placed after [vars]
# parses as vars.routes, an env var, and no domain is bound. Both are custom domains on the tinkerpad.ai
# zone bound to this one Worker; fetch() splits them by host. The content host is a DISTINCT host — the
# sandbox boundary — never collapsed to the app host.
routes = [
  { pattern = "tinkerpad.ai", custom_domain = true },
  { pattern = "content.tinkerpad.ai", custom_domain = true },
]

# The two custom domains above are the ONLY intended public surface. Disable the workers.dev subdomain
# and preview URLs so the app is not also served on an unadvertised origin where the OAuth callback
# (pinned to tinkerpad.ai) can't complete. [LAW:single-enforcer]
workers_dev = false
preview_urls = false

# Bundle the committed, generated front door (src/web/index.html) as a TEXT module so
# `import page from './index.html'` in the Worker yields its string. Run `pnpm build` in the deploy
# pipeline first so the committed file is current (a vitest drift test also guards it).
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# R2: immutable playground html, one object per version (src/storage/r2ArtifactStore.ts).
# Create with: wrangler r2 bucket create tinkerpad-artifacts
[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "tinkerpad-artifacts"

# D1: the catalog (single-row document) and live sessions (one table). This is the PROVISIONED
# database for the tinkerpad.ai launch (schema applied --remote, commons migrated in) — the id below is
# real, not a placeholder. A fresh environment re-provisions with `wrangler d1 create tinkerpad` and
# replaces the id; `wrangler d1 migrations apply tinkerpad --remote` applies the schema.
[[d1_databases]]
binding = "DB"
database_name = "tinkerpad"
database_id = "4c0c7651-3a48-4f41-b1d5-59f1ab2c7048"
migrations_dir = "migrations"

# Non-secret config. The two origins MUST be different hosts — the sandbox boundary. Set these to the
# real deployed hostnames. The GitHub OAuth secrets are NOT here; set them with:
#   wrangler secret put GITHUB_CLIENT_ID
#   wrangler secret put GITHUB_CLIENT_SECRET
[vars]
TINKERPAD_OAUTH_CALLBACK_URL = "https://tinkerpad.ai/session/callback"
TINKERPAD_CONTENT_ORIGIN = "https://content.tinkerpad.ai"
# The moderation admin allowlist — comma-separated subjects (github:<numeric-id>) allowed into /admin.
# Absent/empty = no admins = the console is reachable by NO ONE (safe default), but takedowns can't be
# actioned until it's set. Uncomment and set to the operator's subject before honoring reports/DMCA.
TINKERPAD_ADMIN_SUBJECTS = "github:530235"
